{% extends 'base.html' %}
{% block content %}
<div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
    <h2>All Users</h2>
    <a href="{{ url_for('auth.register') }}" class="btn btn-primary">+ Add User</a>
</div>
<div class="card">
    <table>
        <tr><th>ID</th><th>Username</th><th>Role</th><th>Created At</th></tr>
        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td><span class="role-badge">{{ u.role }}</span></td>
            <td>{{ u.created_at }}</td>
        </tr>
        {% endfor %}
    </table>
</div>
{% endblock %}
