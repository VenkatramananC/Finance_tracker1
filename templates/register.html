{% extends 'base.html' %}
{% block content %}
<div style="max-width: 400px; margin: 60px auto;">
    <div class="card">
        <h2 style="margin-bottom: 20px; text-align:center;">Register</h2>
        <form method="POST">
            <div class="form-group">
                <label>Username</label>
                <input type="text" name="username" required autofocus>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" required>
            </div>
            <div class="form-group">
                <label>Role</label>
                <select name="role">
                    <option value="viewer">Viewer – can view records</option>
                    <option value="analyst">Analyst – can filter & analyse</option>
                    <option value="admin">Admin – full access</option>
                </select>
            </div>
            <button type="submit" class="btn btn-primary" style="width:100%;">Create Account</button>
        </form>
        <p style="margin-top:16px; text-align:center; font-size:13px;">
            Have an account? <a href="{{ url_for('auth.login') }}">Login</a>
        </p>
    </div>
</div>
{% endblock %}
