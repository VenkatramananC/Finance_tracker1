{% extends 'base.html' %}
{% block content %}
<div style="max-width: 500px; margin: 0 auto;">
    <h2 style="margin-bottom: 20px;">{{ action }} Transaction</h2>
    <div class="card">
        <form method="POST">
            <div class="form-group">
                <label>Amount (₹)</label>
                <input type="number" step="0.01" name="amount" required
                       value="{{ transaction.amount if transaction else '' }}"
                       placeholder="e.g. 5000">
            </div>
            <div class="form-group">
                <label>Type</label>
                <select name="type" required>
                    <option value="">-- Select --</option>
                    <option value="income"  {% if transaction and transaction.type=='income'  %}selected{% endif %}>Income</option>
                    <option value="expense" {% if transaction and transaction.type=='expense' %}selected{% endif %}>Expense</option>
                </select>
            </div>
            <div class="form-group">
                <label>Category</label>
                <input type="text" name="category" required
                       value="{{ transaction.category if transaction else '' }}"
                       placeholder="e.g. Food, Salary, Rent">
            </div>
            <div class="form-group">
                <label>Date</label>
                <input type="date" name="date" required
                       value="{{ transaction.date if transaction else '' }}">
            </div>
            <div class="form-group">
                <label>Notes (optional)</label>
                <textarea name="notes" rows="3" placeholder="Any additional details...">{{ transaction.notes if transaction else '' }}</textarea>
            </div>
            <div style="display:flex; gap:12px;">
                <button type="submit" class="btn btn-primary">{{ action }}</button>
                <a href="{{ url_for('transactions.list_transactions') }}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
